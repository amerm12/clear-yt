<!doctype html>
<html style="min-width: 250px">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../pico.classless.red.min.css" />
    <style>
      header,
      h3 {
        text-align: center;
        padding-bottom: 0 !important;
        margin-bottom: 0 !important;
      }

      header,
      h6 {
        font-size: 1rem;
        text-align: start;
      }

      ul {
        padding-left: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h3>clear-yt</h3>
    </header>
    <main>
      <article>
        <header>
          <h6>Hide YouTube Shorts</h6>
        </header>
        <ul>
          <li>From main page</li>
          <li>Button from navigation</li>
          <li>From search results</li>
          <li>From subscription feed</li>
          <li>Tab on channel pages</li>
        </ul>
      </article>
      <label>
        <input type="checkbox" role="switch" checked />
        Enable Extension
      </label>
      <script src="popup.js"></script>
    </main>
  </body>
</html>
